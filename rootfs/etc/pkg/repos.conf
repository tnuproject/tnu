# TNU package repositories.
#
# The canonical upstream is the raw GitHub repository. The .cache entry is a
# bootstrap mirror shipped in the ISO; `pkg sync` copies it into /var/cache/pkg
# until TNU's TCP/HTTP userspace transport is ready.
universe=https://raw.githubusercontent.com/tnuproject/universe/main
universe.cache=file:///usr/share/pkg/repos/universe
