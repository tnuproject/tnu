# Tiramisu sysinstall defaults.
# Values can be overridden on the command line, for example:
#   sysinstall --target /dev/sda --hostname tiramisu --yes
# Root is always TFS. sysinstall writes GPT + BIOS Boot + ESP + TFS root.

rootfs=tfs
hostname=tiramisu
user=root
esp_label=TIRAMISU
root_label=TIRAMISU
install_esp=yes
install_bootloader=yes
confirm=yes
dry_run=no
