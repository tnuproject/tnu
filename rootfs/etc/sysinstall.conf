# Tiramisu sysinstall defaults.
# Values can be overridden on the command line, for example:
#   sysinstall --fs tfs --target /dev/sda --hostname tiramisu --yes
# Real installs require GRUB helper tools; unsafe live ISO cloning is only
# available from the shell wrapper as: sysinstall --raw-image

rootfs=ask
hostname=tiramisu
user=root
esp_label=TIRAMISU
root_label=TIRAMISU
install_esp=yes
install_bootloader=yes
confirm=yes
dry_run=no
